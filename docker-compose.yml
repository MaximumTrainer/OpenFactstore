services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factstore
      POSTGRES_USER: factstore
      POSTGRES_PASSWORD: factstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factstore -d factstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: factstore
      DB_USERNAME: factstore
      DB_PASSWORD: factstore
    ports:
      - "8080:8080"

volumes:
  postgres_data:
