services:
  # ── Write (command) database ──────────────────────────────────────────────
  postgres-command:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factstore_command
      POSTGRES_USER: factstore
      POSTGRES_PASSWORD: factstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_command_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factstore -d factstore_command"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Read (query) database ─────────────────────────────────────────────────
  postgres-query:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factstore_query
      POSTGRES_USER: factstore
      POSTGRES_PASSWORD: factstore
    ports:
      - "5433:5432"
    volumes:
      - postgres_query_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factstore -d factstore_query"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (CQRS event bus) ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Command service (write side) ──────────────────────────────────────────
  backend-command:
    build: .
    depends_on:
      postgres-command:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres-command
      DB_PORT: 5432
      DB_NAME: factstore_command
      DB_USERNAME: factstore
      DB_PASSWORD: factstore
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    ports:
      - "8080:8080"

  # ── Query service (read side) ─────────────────────────────────────────────
  backend-query:
    build: .
    depends_on:
      postgres-query:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres-query
      DB_PORT: 5432
      DB_NAME: factstore_query
      DB_USERNAME: factstore
      DB_PASSWORD: factstore
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    ports:
      - "8081:8080"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend-command

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_command_data:
  postgres_query_data:
