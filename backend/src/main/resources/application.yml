spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:factstore}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  # GitHub OAuth2 Social Login (Web UI)
  # To enable GitHub login, set these environment variables and uncomment the block:
  #   GITHUB_CLIENT_ID=<your-github-oauth-app-client-id>
  #   GITHUB_CLIENT_SECRET=<your-github-oauth-app-client-secret>
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         github:
  #           client-id: ${GITHUB_CLIENT_ID}
  #           client-secret: ${GITHUB_CLIENT_SECRET}
  #           scope: read:user,user:email

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: Factstore API
    version: v1

ledger:
  enabled: ${LEDGER_ENABLED:false}
  type: ${LEDGER_TYPE:local}
  qldb:
    ledger-name: ${QLDB_LEDGER_NAME:factstore-ledger}
    region: ${AWS_REGION:us-east-1}
  local:
    storage-path: ${LEDGER_STORAGE_PATH:./data/ledger}

sso:
  jwt:
    # Secret used to sign Factstore JWTs issued after successful SSO login.
    # Override with a strong random value in production via the SSO_JWT_SECRET environment variable.
    secret: ${SSO_JWT_SECRET:changeme-in-production}
    expiry-hours: ${SSO_JWT_EXPIRY_HOURS:8}
vault:
  enabled: ${VAULT_ENABLED:false}
  uri: ${VAULT_ADDR:http://localhost:8200}
  authentication: ${VAULT_AUTH_METHOD:TOKEN}
  token: ${VAULT_TOKEN:}
  app-role:
    role-id: ${VAULT_ROLE_ID:}
    secret-id: ${VAULT_SECRET_ID:}
  kv:
    enabled: true
    backend: secret
    default-context: factstore
  tls:
    enabled: false

server:
  port: 8080
  # HTTPS / TLS configuration (production)
  # Uncomment and configure the block below to enforce HTTPS:
  # ssl:
  #   enabled: true
  #   key-store: classpath:keystore.p12
  #   key-store-password: ${SSL_KEY_STORE_PASSWORD}
  #   key-store-type: PKCS12
  #   key-alias: factstore
