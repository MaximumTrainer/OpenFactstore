spring:
  datasource:
    url: jdbc:h2:mem:factstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

ledger:
  enabled: true
  type: local

audit:
  hmac-secret: test-secret-for-unit-tests

security:
  enforce-auth: false

