name: Create Backlog Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Issue 11: HashiCorp Vault Integration"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('docs/backlog/11-hashicorp-vault-integration.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Feature: HashiCorp Vault Integration',
              body: body,
              labels: ['enhancement', 'integration', 'security']
            });

      - name: "Issue 12: OPA Integration"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('docs/backlog/12-opa-integration.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Feature: OPA (Open Policy Agent) Integration',
              body: body,
              labels: ['enhancement', 'integration', 'policy']
            });

