name: Terraform Verify

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-verify:
    name: Terraform Provider Build & Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: factstore
          POSTGRES_USER: factstore
          POSTGRES_PASSWORD: factstore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Java + build backend JAR ──────────────────────────────────────────

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar -x test --quiet
        env:
          SPRING_PROFILES_ACTIVE: prod

      # ── Start Factstore backend ───────────────────────────────────────────

      - name: Start Factstore backend
        working-directory: backend
        run: |
          JAR=$(ls build/libs/factstore-*.jar | grep -v plain | head -1)
          nohup java -jar "$JAR" \
            --spring.profiles.active=prod \
            --server.port=8080 \
            > /tmp/factstore.log 2>&1 &
          echo "FACTSTORE_PID=$!" >> "$GITHUB_ENV"
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: factstore
          DB_USERNAME: factstore
          DB_PASSWORD: factstore
          SPRING_PROFILES_ACTIVE: prod

      - name: Wait for Factstore to be healthy
        run: |
          echo "Waiting for Factstore health endpoint..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Factstore is healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Factstore did not start in time. Last log lines:"
          tail -50 /tmp/factstore.log
          exit 1

      # ── Build + install Terraform provider ───────────────────────────────

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: terraform/go.mod
          cache-dependency-path: terraform/go.sum

      - name: Build Terraform provider binary
        working-directory: terraform
        run: go build -o terraform-provider-factstore .

      - name: Install provider as dev override
        run: |
          PROVIDER_DIR="$HOME/.terraform.d/plugins/registry.terraform.io/MaximumTrainer/factstore/1.0.0/linux_amd64"
          mkdir -p "$PROVIDER_DIR"
          cp terraform/terraform-provider-factstore "$PROVIDER_DIR/"
          # Write dev_overrides so Terraform uses the locally built binary
          cat > "$HOME/.terraformrc" <<'EOF'
          provider_installation {
            dev_overrides {
              "MaximumTrainer/factstore" = "$HOME/.terraform.d/plugins/registry.terraform.io/MaximumTrainer/factstore/1.0.0/linux_amd64"
            }
            direct {}
          }
          EOF
          # Substitute $HOME with the actual path (heredoc doesn't expand)
          sed -i "s|\$HOME|$HOME|g" "$HOME/.terraformrc"

      # ── Run Terraform against the live backend ────────────────────────────

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.x'
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init
        env:
          TF_CLI_ARGS: "-no-color"

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -no-color \
            -var="factstore_url=http://localhost:8080" \
            -var="factstore_token="
        env:
          FACTSTORE_BASE_URL: http://localhost:8080
          FACTSTORE_API_TOKEN: ""

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: terraform output -json | tee /tmp/tf-outputs.json

      # ── Verify resources exist in the API ────────────────────────────────

      - name: Verify organisation was created
        run: |
          COUNT=$(curl -sf http://localhost:8080/api/v1/organisations | jq 'length')
          echo "Organisations: $COUNT"
          [ "$COUNT" -ge 1 ] || (echo "Expected at least 1 organisation" && exit 1)

      - name: Verify environments were created
        run: |
          COUNT=$(curl -sf http://localhost:8080/api/v1/environments | jq '.content | length // length')
          echo "Environments: $COUNT"
          [ "$COUNT" -ge 2 ] || (echo "Expected at least 2 environments (staging + production)" && exit 1)

      - name: Verify flows were created
        run: |
          COUNT=$(curl -sf http://localhost:8080/api/v1/flows | jq '.content | length // length')
          echo "Flows: $COUNT"
          [ "$COUNT" -ge 2 ] || (echo "Expected at least 2 flows (backend-ci + frontend-ci)" && exit 1)

      - name: Verify policies were created
        run: |
          COUNT=$(curl -sf http://localhost:8080/api/v1/policies | jq '.content | length // length')
          echo "Policies: $COUNT"
          [ "$COUNT" -ge 2 ] || (echo "Expected at least 2 policies" && exit 1)

      # ── Terraform destroy ─────────────────────────────────────────────────

      - name: Terraform destroy
        if: always()
        working-directory: infra
        run: |
          terraform destroy -auto-approve -no-color \
            -var="factstore_url=http://localhost:8080" \
            -var="factstore_token=" || true
        env:
          FACTSTORE_BASE_URL: http://localhost:8080
          FACTSTORE_API_TOKEN: ""

      # ── Diagnostics on failure ────────────────────────────────────────────

      - name: Print backend logs on failure
        if: failure()
        run: tail -100 /tmp/factstore.log || true
