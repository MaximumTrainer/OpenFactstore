name: Factstore Attest

on:
  workflow_call:
    inputs:
      trail-id:
        description: 'Trail ID (UUID)'
        required: true
        type: string
      attestation-type:
        description: 'Attestation type (e.g. unit-test, security-scan)'
        required: true
        type: string
      status:
        description: 'Attestation status: PASSED or FAILED'
        required: false
        default: 'PASSED'
        type: string
      details:
        description: 'Optional attestation details'
        required: false
        default: ''
        type: string
      factstore-url:
        description: 'Factstore API base URL'
        required: true
        type: string
    secrets:
      factstore-token:
        description: 'Factstore API token'
        required: true

jobs:
  attest:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Record Attestation
        env:
          FACTSTORE_URL: ${{ inputs.factstore-url }}
          FACTSTORE_TOKEN: ${{ secrets.factstore-token }}
          INPUT_TRAIL_ID: ${{ inputs.trail-id }}
          INPUT_ATTESTATION_TYPE: ${{ inputs.attestation-type }}
          INPUT_STATUS: ${{ inputs.status }}
          INPUT_DETAILS: ${{ inputs.details }}
        run: |
          PAYLOAD=$(jq -n \
            --arg trailId "$INPUT_TRAIL_ID" \
            --arg type "$INPUT_ATTESTATION_TYPE" \
            --arg status "$INPUT_STATUS" \
            --arg details "$INPUT_DETAILS" \
            '{trailId: $trailId, type: $type, status: $status, details: $details}')

          curl -s -f -X POST "${FACTSTORE_URL}/api/v1/attestations" \
            -H "Authorization: Bearer ${FACTSTORE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
          echo "Attestation recorded: type=${INPUT_ATTESTATION_TYPE} status=${INPUT_STATUS}"
