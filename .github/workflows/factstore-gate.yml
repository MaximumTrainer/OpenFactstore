name: Factstore Gate Evaluate

on:
  workflow_call:
    inputs:
      artifact-sha256:
        description: 'Artifact SHA-256 digest'
        required: true
        type: string
      environment:
        description: 'Target environment name'
        required: false
        default: ''
        type: string
      flow-id:
        description: 'Flow ID (UUID) for policy lookup'
        required: false
        default: ''
        type: string
      factstore-url:
        description: 'Factstore API base URL'
        required: true
        type: string
      fail-on-block:
        description: 'Fail the workflow if gate blocks deployment'
        required: false
        default: 'true'
        type: string
    secrets:
      factstore-token:
        description: 'Factstore API token'
        required: true
    outputs:
      allowed:
        description: 'Whether the gate allowed the deployment'
        value: ${{ jobs.gate.outputs.allowed }}
      reason:
        description: 'Reason for gate decision'
        value: ${{ jobs.gate.outputs.reason }}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      allowed: ${{ steps.evaluate.outputs.allowed }}
      reason: ${{ steps.evaluate.outputs.reason }}
    steps:
      - name: Evaluate Deployment Gate
        id: evaluate
        env:
          FACTSTORE_URL: ${{ inputs.factstore-url }}
          FACTSTORE_TOKEN: ${{ secrets.factstore-token }}
          INPUT_ARTIFACT_SHA256: ${{ inputs.artifact-sha256 }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_FLOW_ID: ${{ inputs.flow-id }}
          INPUT_FAIL_ON_BLOCK: ${{ inputs.fail-on-block }}
        run: |
          PAYLOAD=$(jq -n \
            --arg artifactSha256 "$INPUT_ARTIFACT_SHA256" \
            --arg environment "$INPUT_ENVIRONMENT" \
            --arg flowId "$INPUT_FLOW_ID" \
            '{artifactSha256: $artifactSha256, environment: $environment, flowId: $flowId}')

          RESULT=$(curl -s -X POST "${FACTSTORE_URL}/api/v1/gate/evaluate" \
            -H "Authorization: Bearer ${FACTSTORE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          ALLOWED=$(echo "$RESULT" | jq -r '.allowed // false')
          REASON=$(echo "$RESULT" | jq -r '.reason // "No reason provided"')

          echo "allowed=$ALLOWED" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Gate decision: allowed=$ALLOWED reason=$REASON"

          if [ "$ALLOWED" = "false" ] && [ "$INPUT_FAIL_ON_BLOCK" = "true" ]; then
            echo "Deployment blocked: $REASON"
            exit 1
          fi
