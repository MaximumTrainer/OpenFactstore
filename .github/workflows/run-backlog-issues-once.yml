name: "Run Backlog Issue Creation (one-time)"

# Temporary workflow — runs once on merge to main, then delete this file.
on:
  push:
    branches: [main]
    paths:
      - 'scripts/create-backlog-issues.js'
      - '.github/workflows/run-backlog-issues-once.yml'

permissions:
  issues: write
  contents: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from backlog and update docs
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./scripts/create-backlog-issues.js');
            await script({ github, context, core, fs: require('fs'), path: require('path') });

      - name: Commit updated backlog files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backlog/*.md
          if git diff --cached --quiet; then
            echo "No backlog files to update"
          else
            git commit -m "docs: update backlog status with new GitHub issue references"
            git push
          fi
