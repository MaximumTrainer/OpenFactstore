name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build and test
        run: ./gradlew build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  frontend-contract:
    name: Frontend Consumer Contract Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run consumer Pact tests
        run: npm run test:pact
      - name: Upload frontend pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts-frontend
          path: pacts/factstore-frontend-factstore-backend.json
          if-no-files-found: error

  cli-contract:
    name: CLI Consumer Contract Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run consumer Pact tests
        run: npm run test:pact
      - name: Upload CLI pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts-cli
          path: pacts/factstore-cli-factstore-backend.json
          if-no-files-found: error

  backend-contract:
    name: Backend Provider Contract Verification
    runs-on: ubuntu-latest
    needs: [ frontend-contract, cli-contract ]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download frontend pact files
        uses: actions/download-artifact@v4
        with:
          name: pacts-frontend
          path: pacts/
      - name: Download CLI pact files
        uses: actions/download-artifact@v4
        with:
          name: pacts-cli
          path: pacts/
      - name: Run provider Pact verification
        run: ./gradlew contractTest
