name: 'Setup Factstore'
description: 'Install and configure the Factstore CLI'
inputs:
  base-url:
    description: 'Factstore server base URL'
    required: true
  api-token:
    description: 'Factstore API token'
    required: true
  version:
    description: 'CLI version to install'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install Factstore CLI
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/MaximumTrainer/OpenFactstore/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        fi
        curl -sL "https://github.com/MaximumTrainer/OpenFactstore/releases/download/${VERSION}/factstore-linux-amd64" -o /usr/local/bin/factstore
        chmod +x /usr/local/bin/factstore
        factstore --version
        echo "FACTSTORE_BASE_URL=${{ inputs.base-url }}" >> $GITHUB_ENV
        echo "FACTSTORE_API_TOKEN=${{ inputs.api-token }}" >> $GITHUB_ENV
        echo "Factstore configured at: ${{ inputs.base-url }}"
